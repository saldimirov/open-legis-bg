[alembic]
script_location = src/open_legis/model/alembic
prepend_sys_path = .
file_template = %%(rev)s_%%(slug)s
sqlalchemy.url = postgresql+psycopg://openlegis:openlegis@localhost:5432/openlegis

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
