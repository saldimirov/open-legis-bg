services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openlegis
      POSTGRES_PASSWORD: openlegis
      POSTGRES_DB: openlegis
      # Server locale is C/POSIX; Bulgarian text is handled at the
      # application layer via the `bulgarian` snowball tsvector config.
      # postgres:16-alpine doesn't ship full locale data, so we do not
      # request a specific locale at initdb time.
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openlegis"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://openlegis:openlegis@postgres:5432/openlegis
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default

volumes:
  postgres_data:
